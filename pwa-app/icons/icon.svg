<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0c1220"/>
  <g transform="translate(256, 240)" fill="none" stroke="#3ec6e0" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左肺 -->
    <path d="M-20,-80 C-50,-80 -110,-60 -130,-10 C-150,40 -130,100 -80,130 C-50,148 -20,150 -20,150" opacity="0.9"/>
    <!-- 右肺 -->
    <path d="M20,-80 C50,-80 110,-60 130,-10 C150,40 130,100 80,130 C50,148 20,150 20,150" opacity="0.9"/>
    <!-- 气管 -->
    <path d="M0,-120 L0,-80" stroke-width="10"/>
    <!-- 分流箭头 -->
    <path d="M-60,30 Q0,-20 60,30" stroke-width="8" stroke-dasharray="6,4" opacity="0.6"/>
    <!-- 分数线 -->
    <line x1="-90" y1="185" x2="90" y2="185" stroke-width="6" opacity="0.5"/>
    <!-- 分子 -->
    <text x="0" y="175" text-anchor="middle" fill="#3ec6e0" stroke="none" font-size="32" font-weight="bold" font-family="Arial">PvCO₂−PaCO₂</text>
    <!-- 分母 -->
    <text x="0" y="218" text-anchor="middle" fill="#3ec6e0" stroke="none" font-size="22" font-weight="bold" font-family="Arial">CaO₂−CvO₂</text>
  </g>
</svg>