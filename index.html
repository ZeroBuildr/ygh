<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080c14">
    <meta name="description" content="云阜SICU - Gap Ratio 临床计算器">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <title>云阜SICU</title>
    <style>
        :root {
            --bg: #080c14;
            --bg-elevated: #0d111c;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.2);
            --danger: #ef4444;
            --success: #10b981;
            --radius-lg: 24px;
            --font-display: 'Space Grotesk', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-serif: 'Noto Serif SC', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; }

        body {
            font-family: var(--font-display);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== BACKGROUND ===== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 700px 500px at 20% 30%, rgba(14, 165, 233, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 500px 400px at 80% 70%, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.04;
            background-image:
                linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ===== SPLASH SCREEN ===== */
        .splash {
            position: relative;
            z-index: 10;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Hospital Badge */
        .hospital-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(14, 165, 233, 0.06);
            border: 1px solid rgba(14, 165, 233, 0.1);
            border-radius: 100px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 36px;
            opacity: 0;
            transform: translateY(16px);
            animation: revealUp 0.8s cubic-bezier(0.32, 0.72, 0, 1) 0.2s forwards;
        }

        .hospital-badge .cross {
            font-size: 0.8rem;
        }

        /* Main Title */
        .title-block {
            text-align: center;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 0.9s cubic-bezier(0.32, 0.72, 0, 1) 0.4s forwards;
        }

        .title-main {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            line-height: 1.2;
            color: var(--text-primary);
            background: linear-gradient(135deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-sub {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-top: 12px;
        }

        /* Divider */
        .divider-line {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 28px auto;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.7s forwards;
        }

        /* Description */
        .desc-block {
            text-align: center;
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(16px);
            animation: revealUp 0.8s cubic-bezier(0.32, 0.72, 0, 1) 0.8s forwards;
        }

        .desc-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.8;
            max-width: 320px;
            margin: 0 auto;
        }

        .desc-highlight {
            color: var(--accent);
            font-weight: 600;
        }

        /* Feature Tags */
        .feature-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeIn 0.7s ease 1.0s forwards;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 100px;
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 0.02em;
        }

        /* CTA Button */
        .cta-wrapper {
            width: 100%;
            max-width: 280px;
            opacity: 0;
            transform: translateY(16px);
            animation: revealUp 0.8s cubic-bezier(0.32, 0.72, 0, 1) 1.2s forwards;
        }

        .cta-btn {
            position: relative;
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border: none;
            border-radius: var(--radius-lg);
            color: #fff;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 24px rgba(14, 165, 233, 0.25), inset 0 1px 0 rgba(255,255,255,0.12);
            transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.08), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .cta-btn:hover {
            box-shadow: 0 8px 32px rgba(14, 165, 233, 0.35), inset 0 1px 0 rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .cta-btn:hover::before { opacity: 1; }
        .cta-btn:active { transform: scale(0.97); }

        .cta-btn .arrow-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .cta-btn:hover .arrow-circle {
            transform: translateX(2px);
        }

        /* Footer */
        .splash-footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.6s ease 1.5s forwards;
        }

        .splash-footer .version {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-tertiary);
            letter-spacing: 0.1em;
        }

        /* Transition overlay for page change */
        .page-transition {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .page-transition.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(3px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (min-width: 500px) {
            .title-main { font-size: 3.2rem; }
            .splash { padding: 60px 40px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="grid-lines"></div>
    <div class="noise-overlay"></div>
    <div class="page-transition" id="transitionOverlay"></div>

    <div class="splash">
        <!-- Hospital Badge -->
        <div class="hospital-badge">
            <span class="cross">&#x1F3E5;</span>
            <span>重症医学科</span>
        </div>

        <!-- Main Title -->
        <div class="title-block">
            <h1 class="title-main">云阜 SICU</h1>
            <p class="title-sub">Surgical Intensive Care Unit</p>
        </div>

        <!-- Divider -->
        <div class="divider-line"></div>

        <!-- Description -->
        <div class="desc-block">
            <p class="desc-text">
                基于 Gap Ratio 公式<br>
                鉴别 <span class="desc-highlight">A型 / B型</span> 乳酸升高<br>
                辅助临床快速判断组织灌注状态
            </p>
        </div>

        <!-- Feature Tags -->
        <div class="feature-tags">
            <span class="tag">Gap Ratio</span>
            <span class="tag">A型 / B型鉴别</span>
            <span class="tag">离线可用</span>
        </div>

        <!-- CTA -->
        <div class="cta-wrapper">
            <button class="cta-btn" onclick="enterApp()">
                <span>进入计算</span>
                <span class="arrow-circle">&#x2192;</span>
            </button>
        </div>

        <!-- Footer -->
        <div class="splash-footer">
            <span class="version">v1.0 &middot; 云阜医院 SICU</span>
        </div>
    </div>

    <script>
        function enterApp() {
            const overlay = document.getElementById('transitionOverlay');
            overlay.classList.add('active');
            setTimeout(() => {
                window.location.href = './app.html';
            }, 400);
        }
    </script>
</body>
</html>
